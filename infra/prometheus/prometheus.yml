global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'novapay-services'
    static_configs:
      - targets: 
        - 'account-service:3001'
        - 'transaction-service:3002'
        - 'ledger-service:3003'
        - 'fx-service:3004'
        - 'payroll-service:3005'
        - 'admin-service:3006'

name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      account: ${{ steps.filter.outputs.account }}
      transaction: ${{ steps.filter.outputs.transaction }}
      ledger: ${{ steps.filter.outputs.ledger }}
      fx: ${{ steps.filter.outputs.fx }}
      payroll: ${{ steps.filter.outputs.payroll }}
    steps:
      - uses: actions/checkout@v3
      - uses: dorny/paths-filter@v2
        id: filter
        with:
          filters: |
            account:
              - 'services/account-service/**'
            transaction:
              - 'services/transaction-service/**'
            ledger:
              - 'services/ledger-service/**'
            fx:
              - 'services/fx-service/**'
            payroll:
              - 'services/payroll-service/**'

  build-account:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.account == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: pnpm/action-setup@v2
        with:
          version: latest
      - uses: actions/setup-node@v3
        with:
          node-version: "18"
          cache: "pnpm"
      - run: pnpm install
      - run: pnpm run build --workspace=account-service
      - run: pnpm run test --workspace=account-service
      - name: Get version
        id: version
        run: echo "version=$(node -p "require('./services/account-service/package.json').version")" >> $GITHUB_OUTPUT
      - name: Build Docker Image
        run: docker build -t novapay/account-service:${{ steps.version.outputs.version }} -f services/account-service/Dockerfile .

  build-transaction:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.transaction == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: pnpm/action-setup@v2
        with:
          version: latest
      - uses: actions/setup-node@v3
        with:
          node-version: "18"
          cache: "pnpm"
      - run: pnpm install
      - run: pnpm run build --workspace=transaction-service
      - run: pnpm run test --workspace=transaction-service
      - name: Get version
        id: version
        run: echo "version=$(node -p "require('./services/transaction-service/package.json').version")" >> $GITHUB_OUTPUT
      - name: Build Docker Image
        run: docker build -t novapay/transaction-service:${{ steps.version.outputs.version }} -f services/transaction-service/Dockerfile .

  build-ledger:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.ledger == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: pnpm/action-setup@v2
        with:
          version: latest
      - uses: actions/setup-node@v3
        with:
          node-version: "18"
          cache: "pnpm"
      - run: pnpm install
      - run: pnpm run build --workspace=ledger-service
      - run: pnpm run test --workspace=ledger-service
      - name: Get version
        id: version
        run: echo "version=$(node -p "require('./services/ledger-service/package.json').version")" >> $GITHUB_OUTPUT
      - name: Build Docker Image
        run: docker build -t novapay/ledger-service:${{ steps.version.outputs.version }} -f services/ledger-service/Dockerfile .

  build-fx:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.fx == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: pnpm/action-setup@v2
        with:
          version: latest
      - uses: actions/setup-node@v3
        with:
          node-version: "18"
          cache: "pnpm"
      - run: pnpm install
      - run: pnpm run build --workspace=fx-service
      - run: pnpm run test --workspace=fx-service
      - name: Get version
        id: version
        run: echo "version=$(node -p "require('./services/fx-service/package.json').version")" >> $GITHUB_OUTPUT
      - name: Build Docker Image
        run: docker build -t novapay/fx-service:${{ steps.version.outputs.version }} -f services/fx-service/Dockerfile .

  build-payroll:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.payroll == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: pnpm/action-setup@v2
        with:
          version: latest
      - uses: actions/setup-node@v3
        with:
          node-version: "18"
          cache: "pnpm"
      - run: pnpm install
      - run: pnpm run build --workspace=payroll-service
      - run: pnpm run test --workspace=payroll-service
      - name: Get version
        id: version
        run: echo "version=$(node -p "require('./services/payroll-service/package.json').version")" >> $GITHUB_OUTPUT
      - name: Build Docker Image
        run: docker build -t novapay/payroll-service:${{ steps.version.outputs.version }} -f services/payroll-service/Dockerfile .

version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: novapay
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  account-service:
    build: 
      context: .
      dockerfile: ./services/account-service/Dockerfile
    env_file: .env.example
    ports:
      - "3001:3001"
    depends_on:
      - db

  transaction-service:
    build: 
      context: .
      dockerfile: ./services/transaction-service/Dockerfile
    env_file: .env.example
    ports:
      - "3002:3002"
    depends_on:
      - db
      - account-service
      - ledger-service
      - fx-service

  ledger-service:
    build: 
      context: .
      dockerfile: ./services/ledger-service/Dockerfile
    env_file: .env.example
    ports:
      - "3003:3003"
    depends_on:
      - db

  fx-service:
    build: 
      context: .
      dockerfile: ./services/fx-service/Dockerfile
    env_file: .env.example
    ports:
      - "3004:3004"
    depends_on:
      - db

  payroll-service:
    build: 
      context: .
      dockerfile: ./services/payroll-service/Dockerfile
    env_file: .env.example
    ports:
      - "3005:3005"
    depends_on:
      - db
      - redis
      - transaction-service

  admin-service:
    build: 
      context: .
      dockerfile: ./services/admin-service/Dockerfile
    env_file: .env.example
    ports:
      - "3006:3006"
    depends_on:
      - db

  nginx:
    image: nginx:latest
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf
    ports:
      - "80:80"
    depends_on:
      - account-service
      - transaction-service
      - fx-service
      - payroll-service
      - admin-service

  prometheus:
    image: prom/prometheus
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus

  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"

volumes:
  postgres_data:
